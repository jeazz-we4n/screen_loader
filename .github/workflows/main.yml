name: Build ASI Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Download DirectX 9 D3DX (Headers & Libs)
      run: nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory dxsdk

    - name: Inject DirectX Paths into Build dynamically
      shell: pwsh
      run: |
        # Tự động lục tìm thư mục chứa d3dx9.h
        $dxInclude = (Get-ChildItem -Path dxsdk -Filter d3dx9.h -Recurse | Select-Object -First 1).DirectoryName
        
        # Tự động lục tìm thư mục chứa d3dx9.lib bản 32-bit (x86)
        $dxLib = (Get-ChildItem -Path dxsdk -Filter d3dx9.lib -Recurse | Where-Object { $_.DirectoryName -match "x86" } | Select-Object -First 1).DirectoryName
        
        Write-Host "Đã tìm thấy Include Path: $dxInclude"
        Write-Host "Đã tìm thấy Library Path: $dxLib"
        
        $props = @"
        <Project>
          <ItemDefinitionGroup>
            <ClCompile>
              <AdditionalIncludeDirectories>$dxInclude;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
            </ClCompile>
            <Link>
              <AdditionalLibraryDirectories>$dxLib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
            </Link>
          </ItemDefinitionGroup>
        </Project>
        "@
        Set-Content -Path Directory.Build.props -Value $props

    - name: Build Solution
      run: msbuild screen_loader.sln /p:Configuration=Release /p:Platform=Win32

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: screen_loader-release
        path: |
          **/*.asi
          **/*.dll
