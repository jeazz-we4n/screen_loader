name: Build ASI Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Download DirectX 9 SDK (Headers & Libs)
      run: nuget install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory dxsdk

    - name: Build Solution
      # Ép GitHub Actions sử dụng Command Prompt cho bước này
      shell: cmd
      # Viết trên 1 dòng với dấu ngoặc kép bao quanh các tham số /p: để an toàn tuyệt đối
      run: msbuild screen_loader.sln /p:Configuration=Release /p:Platform=Win32 /p:IncludePath="%GITHUB_WORKSPACE%\dxsdk\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\include;$(IncludePath)" /p:LibraryPath="%GITHUB_WORKSPACE%\dxsdk\Microsoft.DXSDK.D3DX.9.29.952.8\build\native\lib\x86;$(LibraryPath)"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: screen_loader-release
        path: |
          **/*.asi
          **/*.dll
