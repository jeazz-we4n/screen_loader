name: Build ASI Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Thêm dòng dưới đây để bật nút "Run workflow" chạy thủ công
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Solution
      run: msbuild screen_loader.sln /p:Configuration=Release /p:Platform=Win32

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: screen_loader-release
        path: |
          **/*.asi
          **/*.dll
